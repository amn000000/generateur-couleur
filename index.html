<!DOCTYPE html>
<html>
<head>
<title>✨ The Ultimate Hub</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1e1e2f,#2d2d4f,#141414);
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */

header{
padding:60px 20px;
font-size:40px;
font-weight:700;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
}

/* CATEGORIES */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:60px 20px;
}

.card{
width:250px;
height:180px;
border-radius:25px;
background:linear-gradient(145deg,#ffffff22,#ffffff05);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:500;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-15px) scale(1.05);
background:linear-gradient(145deg,#ff6b6b,#4e73ff);
}

/* SECTION CONTENT */

.section{
display:none;
padding:50px;
animation:fade 0.5s ease-in-out;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* BUTTON */

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff6b6b;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4e73ff;
transform:scale(1.1);
}

textarea{
width:90%;
height:120px;
border-radius:15px;
padding:15px;
border:none;
}

</style>
</head>
<body>

<header>
✨ THE ULTIMATE HUB
<p style="font-size:18px;font-weight:300;">Un site magnifique avec des catégories stylées</p>
</header>

<!-- CATEGORIES -->

<div class="container">

<div class="card" onclick="openSection('ia')">🤖 IA</div>
<div class="card" onclick="openSection('games')">🎮 Jeux</div>
<div class="card" onclick="openSection('music')">🎵 Musique</div>
<div class="card" onclick="openSection('gallery')">🖼 Galerie</div>
<div class="card" onclick="openSection('notes')">📝 Notes</div>
<div class="card" onclick="openSection('extra')">🚀 Extra</div>

</div>

<!-- IA -->

<div id="ia" class="section">
<h2>🤖 IA Simple</h2>
<input id="question" placeholder="Pose une question..." style="padding:10px;border-radius:15px;border:none;width:60%;">
<br><br>
<button onclick="ask()">Envoyer</button>
<p id="answer"></p>
</div>

<!-- JEUX -->

<div id="Games" class="section">
<div class="card">
<h2>🎮 20 Jeux</h2>

<div id="gameList" class="game-grid"></div>
<div id="gameArea"></div>

</div>
</div>

<!-- MUSIQUE -->

<div id="music" class="section">
<h2>🎵 Musique</h2>

<iframe style="border-radius:20px"
width="80%" height="350"
src="https://www.youtube.com/embed?listType=playlist&list=PLMC9KNkIncKtPzgY-5rmhvj7fax8fdxoj">
</iframe>

</div>

<!-- GALERIE -->

<div id="gallery" class="section">
<h2>🖼 Galerie</h2>

<input type="file" accept="image/*" onchange="addImage(event)">
<div id="galleryContainer"></div>

</div>

<!-- NOTES -->

<div id="notes" class="section">
<h2>📝 Notes</h2>
<textarea placeholder="Écris quelque chose..."></textarea>
</div>

<!-- EXTRA -->

<div id="extra" class="section">
<h2>🚀 Extra</h2>
<p>Section vide prête pour 50 fonctionnalités 😈</p>
</div>

<script>

/* NAVIGATION */

function openSection(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

/* IA */

function ask(){

let q=document.getElementById("question").value.toLowerCase();

let response="🤖 Intéressant...";

if(q.includes("bonjour")) response="👋 Bonjour !!";
if(q.includes("qui")) response="Je suis une IA simple créée dans ce site.";

document.getElementById("answer").textContent=response;

}

/* GAME */

let secret=Math.floor(Math.random()*10)+1;

function play(){

let guess=document.getElementById("guess").value;

if(guess==secret){
document.getElementById("result").textContent="🎉 Gagné !";
secret=Math.floor(Math.random()*10)+1;
}else{
document.getElementById("result").textContent="❌ Faux";
}

}

/* GALLERY */

function addImage(event){

let file=event.target.files[0];

if(file){
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
img.style.width="150px";
img.style.borderRadius="15px";
img.style.margin="10px";

document.getElementById("galleryContainer").appendChild(img);
}

}
/* ================================
   SYSTEME 20 JEUX
================================ */

const games = [];

/* --- JEUX 1 à 10 (Vrais) --- */

games.push({name:"Snake", action:snakeGame});
games.push({name:"Clicker", action:clickGame});
games.push({name:"Guess Number", action:guessGame});
games.push({name:"TicTacToe", action:tictactoe});
games.push({name:"Memory", action:memoryGame});
games.push({name:"Reaction", action:reactionGame});
games.push({name:"Typing", action:typingGame});
games.push({name:"Rock Paper", action:rpsGame});
games.push({name:"Math Quiz", action:mathGame});
games.push({name:"Quiz", action:quizGame});

/* --- JEUX 11 à 20 (Templates) --- */

for(let i=11;i<=20;i++){
games.push({
name:"Game "+i,
action:()=>alert("Jeu "+i+" encore à développer 😎")
});
}

/* GENERATEUR */

function loadGames(){

let list=document.getElementById("gameList");
list.innerHTML="";

games.forEach(game=>{

let card=document.createElement("div");
card.className="game-card";
card.textContent=game.name;

card.onclick=()=>game.action();

list.appendChild(card);

});

}

loadGames();
</script>

</body>
</html>
