<!DOCTYPE html>
<html>
<head>

<title>The Site 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#f4f4f4,#e8e8ff);
transition:0.4s;
}

/* HEADER */

header{
text-align:center;
padding:40px;
font-size:32px;
font-weight:700;
}

/* NAV */

nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
}

nav button{
padding:10px 18px;
border-radius:20px;
border:none;
background:black;
color:white;
cursor:pointer;
transition:0.3s;
}

nav button:hover{
transform:scale(1.1);
background:#333;
}

/* SECTIONS */

.section{
display:none;
padding:40px;
}

.active{
display:block;
}

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:1000px;
margin:auto;
}

/* Galerie */

.gallery img{
width:150px;
border-radius:15px;
margin:10px;
}

/* Bouton upload */

input[type="file"]{
margin-top:10px;
}

</style>
</head>

<body>

<header>
👋 Bienvenue sur The Site
</header>

<nav>
<button onclick="openSection('home')">Home</button>
<button onclick="openSection('ia')">IA</button>
<button onclick="openSection('games')">🎮 Jeux</button>
<button onclick="openSection('music')">🎵 Musique</button>
<button onclick="openSection('gallery')">🖼 Galerie</button>
</nav>

<!-- HOME -->

<div id="home" class="section active">
<div class="card">
<h2>✨ Un site plus humain</h2>
<p>Explore les catégories et amuse-toi 🚀</p>
</div>
</div>

<!-- IA -->

<div id="ia" class="section">
<div class="card">
<h2>🤖 IA Simple</h2>

<input id="question" placeholder="Pose une question..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;">
<br><br>
<button onclick="repondre()">Envoyer</button>

<p id="reponse"></p>

</div>
</div>

<!-- JEUX -->

<div id="games" class="section">
<div class="card">
<h2>🎮 Jeux</h2>

<p>Jeu 1 - Devine le nombre</p>
<input type="number" id="guess">
<button onclick="jeu1()">Tester</button>
<p id="result"></p>

<hr>

<p>Jeu 2 - Click Counter</p>
<button onclick="clicker()">Clique moi</button>
<p id="count">0</p>

<hr>

<p>Plus de jeux à ajouter ici 🔥</p>

</div>
</div>

<!-- MUSIQUE -->

<div id="music" class="section">
<div class="card">
<h2>🎵 Lecteur Musique</h2>

<iframe style="border-radius:20px"
src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M"
width="100%" height="380"
allow="encrypted-media">
</iframe>

</div>
</div>

<!-- GALERIE -->

<div id="gallery" class="section">
<div class="card">
<h2>🖼 Galerie</h2>

<input type="file" id="upload" accept="image/*">
<br><br>

<div class="gallery" id="galleryContainer"></div>

</div>
</div>

<script>

/* NAVIGATION */

function openSection(id){

document.querySelectorAll(".section")
.forEach(sec => sec.classList.remove("active"));

document.getElementById(id)
.classList.add("active");
}

/* IA */

function repondre(){

let q=document.getElementById("question").value;

document.getElementById("reponse")
.textContent="🤖 Interessant : " + q;

}

/* JEUX */

let secret=Math.floor(Math.random()*10)+1;

function jeu1(){

let guess=document.getElementById("guess").value;

if(guess==secret){
document.getElementById("result").textContent="🎉 Gagné !";
secret=Math.floor(Math.random()*10)+1;
}else{
document.getElementById("result").textContent="❌ Faux";
}

}

let counter=0;

function clicker(){
counter++;
document.getElementById("count").textContent=counter;
}

/* GALERIE */

document.getElementById("upload")
.addEventListener("change",function(event){

let file=event.target.files[0];

if(file){
let img=document.createElement("img");
img.src=URL.createObjectURL(file);
document.getElementById("galleryContainer").appendChild(img);
}

});

</script>

</body>
</html>
