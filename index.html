<!DOCTYPE html>
<html>
<head>
<title>Super Dashboard 🎨</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
transition:0.4s;
}

.dark{
background:#111;
color:white;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.section{
background:white;
margin:30px auto;
padding:20px;
width:90%;
max-width:1000px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.dark .section{
background:#1e1e1e;
}

h2{
margin-top:0;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-size:14px;
}

input,textarea{
padding:10px;
width:100%;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.palette{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:15px;
}

.couleur{
width:120px;
height:120px;
border-radius:12px;
display:flex;
align-items:flex-end;
justify-content:center;
color:white;
font-weight:bold;
cursor:pointer;
position:relative;
}

.lock{
position:absolute;
top:8px;
right:8px;
font-size:14px;
}

</style>
</head>

<body>

<header>
🎨 Super Dashboard Perso
<button onclick="toggleTheme()">🌙 Mode</button>
</header>

<!-- PALETTE -->
<div class="section">
<h2>Palette Couleurs</h2>

<label>Nombre de couleurs</label>
<input type="range" min="1" max="10" value="5" id="slider">
<span id="nb">5</span>

<button onclick="genererPalette()">Nouvelle palette</button>
<button onclick="copierPalette()">📦 Copier palette</button>

<div class="palette" id="palette"></div>
</div>

<!-- HORLOGE -->
<div class="section">
<h2>Horloge</h2>
<h3 id="clock"></h3>
</div>

<!-- BLOC NOTE -->
<div class="section">
<h2>Bloc Notes</h2>
<textarea id="note" rows="6" placeholder="Écris ici..."></textarea>
</div>

<!-- MINI JEU -->
<div class="section">
<h2>Mini Jeu - Devine le nombre</h2>

<p>Devine un nombre entre 1 et 10</p>
<input type="number" id="guess">
<button onclick="verifier()">Tester</button>
<p id="result"></p>

</div>

<script>

/* THEME */

function toggleTheme(){
document.body.classList.toggle("dark");
}

/* PALETTE */

let lockedColors={};

document.getElementById("slider").oninput=function(){
document.getElementById("nb").textContent=this.value;
genererPalette();
};

function randomColor(){
return "#" + Math.floor(Math.random()*16777215).toString(16);
}

function genererPalette(){

let palette=document.getElementById("palette");
palette.innerHTML="";

let nb=document.getElementById("slider").value;

for(let i=0;i<nb;i++){

let couleur=lockedColors[i] || randomColor();

let div=document.createElement("div");
div.className="couleur";
div.style.background=couleur;
div.textContent=couleur;

if(lockedColors[i]){
div.style.border="3px solid gold";
}

div.onclick=function(){
navigator.clipboard.writeText(couleur);
alert("Copié : "+couleur);
}

let lock=document.createElement("div");
lock.className="lock";
lock.textContent="🔒";

lock.onclick=function(e){
e.stopPropagation();

if(lockedColors[i]){
delete lockedColors[i];
}else{
lockedColors[i]=couleur;
}

genererPalette();
}

div.appendChild(lock);
palette.appendChild(div);
}

localStorage.setItem("palette",JSON.stringify(lockedColors));
}

function copierPalette(){

let couleurs=[...document.querySelectorAll(".couleur")]
.map(el=>el.textContent)
.join(", ");

navigator.clipboard.writeText(couleurs);
alert("Palette copiée !");
}

/* HORLOGE */

function updateClock(){
let now=new Date();
document.getElementById("clock").textContent=
now.toLocaleTimeString() + " - " + now.toLocaleDateString();
}

setInterval(updateClock,1000);
updateClock();

/* MINI JEU */

let secret=Math.floor(Math.random()*10)+1;

function verifier(){

let guess=document.getElementById("guess").value;
let result=document.getElementById("result");

if(guess==secret){
result.textContent="🎉 Bravo !";
secret=Math.floor(Math.random()*10)+1;
}else{
result.textContent="❌ Faux ! Essaie encore.";
}

}

/* CHARGEMENT */

genererPalette();

</script>

</body>
</html>
